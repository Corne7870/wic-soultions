<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 572 426">
  <defs>
    <style>
      .logo-white { fill: #ffffff; }
      .logo-yellow { fill: #fff200; stroke: #fff200; stroke-width: 12; stroke-linecap: round; fill: none; }
      .text-outline { 
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
        font-weight: 800; 
        font-size: 54px; 
        fill: none; 
        stroke: #ffffff; 
        stroke-width: 1.8;
        letter-spacing: 0.15em; 
      }
    </style>
  </defs>

  <!-- Stylized Yellow Arc -->
  <path d="M 120 310 C 20 280 20 80 220 60 C 420 40 520 180 500 310" class="logo-yellow" />

  <!-- The Iconic 'W' (Pixel-Matched) -->
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="28" height="120" class="logo-white" /> <!-- Left Vertical -->
    <rect x="112" y="0" width="28" height="120" class="logo-white" /> <!-- Right Vertical -->
    <!-- Middle Chevron/Peak -->
    <path d="M 28 0 L 70 65 L 112 0 L 85 0 L 70 25 L 55 0 Z" class="logo-white" />
    <path d="M 35 60 L 70 120 L 105 60 L 90 60 L 70 95 L 50 60 Z" class="logo-white" />
    
    <!-- Skyline (3 Blocks with Sloping Roofs) -->
    <g transform="translate(145, 45)">
      <!-- Block 1 -->
      <path d="M 0 75 L 0 32 L 32 15 L 32 75 Z" class="logo-white" />
      <!-- Block 2 -->
      <path d="M 38 75 L 38 25 L 70 8 L 70 75 Z" class="logo-white" />
      <!-- Block 3 -->
      <path d="M 76 75 L 76 40 L 108 23 L 108 75 Z" class="logo-white" />
    </g>
  </g>

  <!-- WIC SOLUTIONS Text (Outlined) -->
  <text x="286" y="360" text-anchor="middle" class="text-outline">WIC SOLUTIONS</text>
</svg>
